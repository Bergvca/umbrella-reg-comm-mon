apiVersion: apps/v1
kind: Deployment
metadata:
  name: umbrella-ui-backend
  namespace: umbrella-ui
  labels:
    app: umbrella-ui-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: umbrella-ui-backend
  template:
    metadata:
      labels:
        app: umbrella-ui-backend
    spec:
      containers:
        - name: umbrella-ui-backend
          image: umbrella-ui-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: umbrella-ui-backend-config
          env:
            - name: UMBRELLA_UI_IAM_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: umbrella-ui-credentials
                  key: IAM_DATABASE_URL
            - name: UMBRELLA_UI_POLICY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: umbrella-ui-credentials
                  key: POLICY_DATABASE_URL
            - name: UMBRELLA_UI_ALERT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: umbrella-ui-credentials
                  key: ALERT_DATABASE_URL
            - name: UMBRELLA_UI_REVIEW_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: umbrella-ui-credentials
                  key: REVIEW_DATABASE_URL
            - name: UMBRELLA_UI_ENTITY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: umbrella-ui-credentials
                  key: ENTITY_DATABASE_URL
            - name: UMBRELLA_UI_AGENT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: umbrella-ui-credentials
                  key: AGENT_DATABASE_URL
            - name: UMBRELLA_UI_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: umbrella-ui-credentials
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
