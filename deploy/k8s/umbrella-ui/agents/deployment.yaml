apiVersion: apps/v1
kind: Deployment
metadata:
  name: umbrella-agent-runtime
  namespace: umbrella-ui
  labels:
    app: umbrella-agent-runtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: umbrella-agent-runtime
  template:
    metadata:
      labels:
        app: umbrella-agent-runtime
    spec:
      containers:
        - name: umbrella-agent-runtime
          image: umbrella-agent-runtime:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8001
              name: http
          envFrom:
            - configMapRef:
                name: umbrella-agent-runtime-config
            - secretRef:
                name: umbrella-agent-runtime-credentials
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
