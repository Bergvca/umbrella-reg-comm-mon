apiVersion: batch/v1
kind: Job
metadata:
  name: umbrella-agent-model-seed
  namespace: umbrella-ui
  labels:
    app: umbrella-agent-model-seed
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: umbrella-agent-model-seed
    spec:
      restartPolicy: Never

      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgresql.umbrella-storage.svc -p 5432 -U agent_rw; do
                echo "Waiting for PostgreSQL..."
                sleep 3
              done
          resources:
            requests:
              cpu: 50m
              memory: 32Mi

      containers:
        - name: seed
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              # Strip +asyncpg driver prefix so psql can use the URL
              DB_URL=$(echo "$AGENTS_DATABASE_URL" | sed 's|+asyncpg||')

              # Escape single quotes for SQL string literals
              NAME=$(printf '%s' "$AGENT_MODEL_NAME"     | sed "s/'/''/g")
              PROV=$(printf '%s' "$AGENT_MODEL_PROVIDER" | sed "s/'/''/g")
              MID=$(printf '%s'  "$AGENT_MODEL_ID"       | sed "s/'/''/g")
              BURL=$(printf '%s' "$AGENT_MODEL_BASE_URL" | sed "s/'/''/g")

              psql "$DB_URL" -c "
                INSERT INTO agent.models (name, provider, model_id, base_url, is_active)
                VALUES ('$NAME', '$PROV', '$MID', NULLIF('$BURL', ''), true)
                ON CONFLICT (name) DO UPDATE SET
                  provider   = EXCLUDED.provider,
                  model_id   = EXCLUDED.model_id,
                  base_url   = EXCLUDED.base_url,
                  is_active  = true,
                  updated_at = now();
              "

              # Seed second model if configured
              if [ -n "$AGENT_MODEL_2_NAME" ]; then
                NAME2=$(printf '%s' "$AGENT_MODEL_2_NAME"     | sed "s/'/''/g")
                PROV2=$(printf '%s' "$AGENT_MODEL_2_PROVIDER" | sed "s/'/''/g")
                MID2=$(printf '%s'  "$AGENT_MODEL_2_ID"       | sed "s/'/''/g")
                BURL2=$(printf '%s' "$AGENT_MODEL_2_BASE_URL" | sed "s/'/''/g")
                AKEY2=$(printf '%s' "$AZURE_KIMI_API_KEY"     | sed "s/'/''/g")

                psql "$DB_URL" -c "
                  INSERT INTO agent.models (name, provider, model_id, base_url, api_key_secret, is_active)
                  VALUES ('$NAME2', '$PROV2', '$MID2', NULLIF('$BURL2', ''), NULLIF('$AKEY2', ''), true)
                  ON CONFLICT (name) DO UPDATE SET
                    provider       = EXCLUDED.provider,
                    model_id       = EXCLUDED.model_id,
                    base_url       = EXCLUDED.base_url,
                    api_key_secret = EXCLUDED.api_key_secret,
                    is_active      = true,
                    updated_at     = now();
                "
              fi

              # Seed third model if configured (OpenRouter)
              if [ -n "$AGENT_MODEL_3_NAME" ]; then
                NAME3=$(printf '%s' "$AGENT_MODEL_3_NAME"     | sed "s/'/''/g")
                PROV3=$(printf '%s' "$AGENT_MODEL_3_PROVIDER" | sed "s/'/''/g")
                MID3=$(printf '%s'  "$AGENT_MODEL_3_ID"       | sed "s/'/''/g")
                BURL3=$(printf '%s' "$AGENT_MODEL_3_BASE_URL" | sed "s/'/''/g")
                AKEY3=$(printf '%s' "$OPENROUTER_API_KEY"     | sed "s/'/''/g")

                psql "$DB_URL" -c "
                  INSERT INTO agent.models (name, provider, model_id, base_url, api_key_secret, is_active)
                  VALUES ('$NAME3', '$PROV3', '$MID3', NULLIF('$BURL3', ''), NULLIF('$AKEY3', ''), true)
                  ON CONFLICT (name) DO UPDATE SET
                    provider       = EXCLUDED.provider,
                    model_id       = EXCLUDED.model_id,
                    base_url       = EXCLUDED.base_url,
                    api_key_secret = EXCLUDED.api_key_secret,
                    is_active      = true,
                    updated_at     = now();
                "
              fi

              # Seed fourth model if configured
              if [ -n "$AGENT_MODEL_4_NAME" ]; then
                NAME4=$(printf '%s' "$AGENT_MODEL_4_NAME"     | sed "s/'/''/g")
                PROV4=$(printf '%s' "$AGENT_MODEL_4_PROVIDER" | sed "s/'/''/g")
                MID4=$(printf '%s'  "$AGENT_MODEL_4_ID"       | sed "s/'/''/g")
                BURL4=$(printf '%s' "$AGENT_MODEL_4_BASE_URL" | sed "s/'/''/g")
                AKEY4=$(printf '%s' "$OPENROUTER_API_KEY"     | sed "s/'/''/g")

                psql "$DB_URL" -c "
                  INSERT INTO agent.models (name, provider, model_id, base_url, api_key_secret, is_active)
                  VALUES ('$NAME4', '$PROV4', '$MID4', NULLIF('$BURL4', ''), NULLIF('$AKEY4', ''), true)
                  ON CONFLICT (name) DO UPDATE SET
                    provider       = EXCLUDED.provider,
                    model_id       = EXCLUDED.model_id,
                    base_url       = EXCLUDED.base_url,
                    api_key_secret = EXCLUDED.api_key_secret,
                    is_active      = true,
                    updated_at     = now();
                "
              fi

              echo "Seed complete."
          envFrom:
            - secretRef:
                name: umbrella-agent-runtime-credentials
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
